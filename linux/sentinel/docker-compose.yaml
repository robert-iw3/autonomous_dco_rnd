---
services:
  linux-sentinel-agent:
    security_opt:
    - seccomp:unconfined
    build:
      context: .
      dockerfile: Dockerfile
    image: linux-sentinel:latest
    pull_policy: build
    container_name: linux-sentinel-agent
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
      - DAC_READ_SEARCH
      - SYS_PTRACE
      - SYS_ADMIN
      - SYS_RESOURCE
      - BPF
      - PERFMON
      - KILL
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      - /proc:/host/proc:ro
      - ./sentinel-data:/var/log/linux-sentinel:z
      - ./sentinel-data/clamav:/var/lib/clamav:z
      - ./sentinel-data/parquet:/var/backups/linux-sentinel/parquet:z
      - ./certs:/opt/linux-sentinel/certs:ro,z
      - ./master.toml:/opt/linux-sentinel/master.toml:ro,z
      - ./intel_staging:/opt/linux-sentinel/intel_staging:ro,z
    environment:
      - SENTINEL_AUTH_TOKEN=${SENTINEL_AUTH_TOKEN}

  sentinel-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: linux-sentinel-dashboard:latest
    pull_policy: build
    container_name: sentinel-api-dashboard
    ports:
      - "127.0.0.1:8443:8443"
    depends_on:
      - linux-sentinel-agent
    volumes:
      - ./dashboard/certs:/certs:ro,Z
      - ./sentinel-data:/var/log/linux-sentinel:rw,Z
      - ./dashboard/data:/app/data:rw,Z
      - ./dashboard_config.yaml:/app/config.yaml:ro,Z
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M