---
services:
  c2-sensor-core:
    build:
      context: ../
      dockerfile: deploy/ebpf.Dockerfile
    image: c2-sensor-core:v0.7.0
    container_name: c2-sensor-core
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - SYS_PTRACE
      - IPC_LOCK
      - BPF
      - PERFMON
    security_opt:
      - apparmor:unconfined
    network_mode: "host"
    pid: "host"
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /sys/kernel/btf/vmlinux:/sys/kernel/btf/vmlinux:ro
      - ../data:/app/data:rw
      - ../deploy/config.toml:/app/config.toml:ro
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      - /proc:/host/proc:ro
    environment:
      - SENSOR_CONFIG_PATH=/app/config.toml
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "test", "-f", "/app/data/baseline.db"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  c2-api-dashboard:
    build:
      context: ../
      dockerfile: deploy/dashboard.Dockerfile
    image: c2-api-dashboard:v0.7.0
    container_name: c2-api-dashboard
    depends_on:
      c2-sensor-core:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8443}:8443"
    volumes:
      - ../certs:/app/certs:ro
      - ../data:/app/data:rw
      - ../deploy/config.toml:/app/config.toml:ro
    environment:
      - SENSOR_CONFIG_PATH=/app/config.toml
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1:8443/api/v2/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s