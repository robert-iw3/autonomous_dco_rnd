<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" width="100%" height="100%" style="background-color: #0A0A0C; font-family: 'Courier New', Courier, monospace;">
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#39FF14" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FF9900" />
