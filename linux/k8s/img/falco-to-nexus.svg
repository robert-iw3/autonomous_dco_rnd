  <rect x="840" y="340" width="200" height="80" fill="#291A40" stroke="#B026FF" stroke-width="2" rx="4" />
  <text x="940" y="370" fill="#E6EDF3" font-size="14" font-weight="bold" text-anchor="middle">Agentic AI Swarm</text>
  <text x="940" y="390" fill="#A0ABB8" font-size="11" text-anchor="middle">Full-Spectrum Correlation &amp;</text>
