apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: middleware-splunk-scaler
  namespace: middleware
spec:
  scaleTargetRef:
    name: middleware-worker_splunk
  minReplicaCount: 1
  maxReplicaCount: 8
  pollingInterval: 10
  triggers:
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.middleware.svc.cluster.local:8222"
      account: "$G"
      stream: "MiddlewareStream"
      consumer: "Middleware_Splunk_CIM_Group"
      lagThreshold: "5000"
