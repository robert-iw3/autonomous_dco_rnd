apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware-ingress
  namespace: middleware
spec:
  replicas: 2
  selector:
    matchLabels:
      app: middleware-ingress
  template:
    metadata:
      labels:
        app: middleware-ingress
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
    spec:
      containers:
      - name: ingress
        image: middleware:latest
        command: ["/app/core_ingress"]
        env:
        - name: MIDDLEWARE_CONFIG
          value: /config/middleware.toml
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 9000
          name: metrics
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        - name: certs
          mountPath: /config/certs
          readOnly: true
        resources:
          requests: { cpu: "250m", memory: "256Mi" }
          limits: { cpu: "1", memory: "1Gi" }
        livenessProbe:
          httpGet: { path: /healthz, port: 8443, scheme: HTTPS }
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet: { path: /healthz, port: 8443, scheme: HTTPS }
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: middleware-config
      - name: certs
        secret:
          secretName: middleware-tls
---
apiVersion: v1
kind: Service
metadata:
  name: middleware-ingress
  namespace: middleware
spec:
  type: LoadBalancer
  ports:
  - port: 8443
    targetPort: 8443
    name: https
  - port: 9000
    targetPort: 9000
    name: metrics
  selector:
    app: middleware-ingress