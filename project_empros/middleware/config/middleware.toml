[global]
# nats_url uses 127.0.0.1 (localhost) because middleware runs on the host and
# connects to NATS via the host-mapped port, NOT via the Docker DNS alias "nats".
# Sensor services (worker_qdrant, worker_rules, orchestrator) use "nats://nats:4222"
# (Docker service hostname) instead -- this divergence is intentional by design.
# Override via NEXUS_NATS_URL env var for containerised middleware deployments.
nats_url = "nats://127.0.0.1:4222"
# MiddlewareStream is separate from Sensor_Telemetry -- middleware subjects
# use the "middleware.*" prefix, not "nexus.*", to enforce pipeline isolation.
stream_name = "MiddlewareStream"
telemetry_subject = "middleware.telemetry"
dlq_subject_prefix = "middleware.dlq"

[ingress]
bind_addr = "0.0.0.0:8443"
auth_token = "ChangeMe-Rotate-In-Production"
max_payload_bytes = 10485760  # 10MB
tls_enabled = true
tls_cert_path = "certs/server.pem"
tls_key_path = "certs/server-key.pem"
integrity_secret = "Nexus-Integrity-SharedKey-Rotate-Me"
integrity_ban_threshold = 5

[destinations]
nexus_enabled = true
splunk_enabled = false
elastic_enabled = false
sql_enabled = false

[nexus]
gateway_url = "https://nexus-gateway.internal:8080/api/v1/telemetry"
auth_token = "NexusGatewayToken"
integrity_secret = "Nexus-Integrity-SharedKey-Rotate-Me"
verify_tls = true
max_backoff_sec = 60

[splunk]
hec_url = "https://splunk-hf.internal:8088/services/collector/event"
hec_token = "SplunkHecToken"
index_endpoint = "nexus_endpoint"
index_cloud = "nexus_cloud"
index_network = "nexus_network"
index_alerts = "nexus_alerts"
index_default = "nexus_endpoint"
alert_score_threshold = 70
target_sourcetype = "nexus:generic"
batch_size = 500
timeout_seconds = 15
verify_tls = false

[elastic]
host = "https://elastic-cluster.internal:9200"
index_endpoint = "nexus-endpoint"
index_cloud = "nexus-cloud"
index_network = "nexus-network"
index_default = "nexus-telemetry"
auth = ""  # "user:pass" for Basic auth, or bare API key string
pipeline = "nexus-telemetry-pipeline"
batch_size = 1000
timeout_seconds = 15
verify_tls = false

[sql]
host = "sql.internal.corp"
port = 1433
database = "Sensor_Telemetry"
use_sspi = true
user = ""
pass = ""
encryption = "Required"
trust_server_cert = true
sproc = "EXEC dbo.sp_IngestSensorTelemetry @json = @P1"
batch_size = 2000
pool_size = 4
connect_timeout_sec = 10
test_webhook_url = ""

[schemas]
cim_mappings_file = "/config/cim_mappings.yaml"
ecs_mappings_file = "/config/ecs_mappings.yaml"
