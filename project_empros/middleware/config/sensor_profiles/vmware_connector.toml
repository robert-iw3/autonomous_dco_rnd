# VMware vSphere/vSAN Syslog Connector -- server-side pull connector
# Pulls structured syslog events from vCenter and ESXi hosts and forwards
# to middleware with sensor_type = vmware_syslog for cloud_flow vector routing.

[transmission]
middleware_url = "https://middleware.internal:8443/api/v1/telemetry"
auth_token = "ChangeMe-Rotate-In-Production"
sensor_type = "vmware_syslog"
integrity_secret = "Nexus-Integrity-SharedKey-Rotate-Me"
max_backoff_sec = 60
spool_dir = "/app/data/spool"

[tls]
enabled = true
ca_path = "/app/certs/ca.pem"
verify = true

[vmware]
vcenter_url = "https://vcenter.internal.local"
username = "nexus-readonly@vsphere.local"
password_env_var = "VMWARE_PASSWORD"
syslog_port = 514
