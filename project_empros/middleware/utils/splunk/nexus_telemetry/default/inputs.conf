#
# Sentinel Nexus -- HEC Token Configuration
#
# Deploy to the Splunk instance receiving middleware traffic
# (heavy forwarder or indexer with HEC enabled).
#
# Enable HEC globally first:
#   [http]
#   disabled = 0
#   port = 8088
#   enableSSL = 1
#   dedicatedIoThreads = 2
#

[http://Nexus_Middleware]
disabled = 0
token = <GENERATE-WITH: splunk cmd python -c "import uuid; print(uuid.uuid4())">
# Restrict to nexus indexes only
indexes = nexus_endpoint, nexus_cloud, nexus_network, nexus_alerts
# Default index if the event doesn't specify one
index = nexus_endpoint
# Allow the middleware to set sourcetype per-event
allowQueryStringAuth = false
# Connection settings
useACK = true
# Require valid sourcetypes from our app
connection_host = ip
