#
# Sentinel Nexus -- CIM Data Model Tags
#
# Maps event types to Splunk CIM data models so ES and
# CIM-based dashboards recognize the telemetry automatically.
#

# ─── Endpoint data model ──────────────────────────────────────
[eventtype=nexus_endpoint_linux]
endpoint  = enabled
process   = enabled
report    = enabled

[eventtype=nexus_endpoint_deepsensor]
endpoint  = enabled
process   = enabled
report    = enabled

[eventtype=nexus_endpoint_c2win]
endpoint  = enabled
process   = enabled
report    = enabled

[eventtype=nexus_endpoint_sentinel]
endpoint  = enabled
process   = enabled
report    = enabled

# ─── Change data model (control plane mutations) ─────────────
[eventtype=nexus_cloud_cloudtrail]
change    = enabled
audit     = enabled

[eventtype=nexus_cloud_azure_activity]
change    = enabled
audit     = enabled

# ─── Network Traffic data model (flows) ──────────────────────
[eventtype=nexus_cloud_flow]
network   = enabled
communicate = enabled

[eventtype=nexus_network_session]
network   = enabled
communicate = enabled

# ─── Authentication data model ───────────────────────────────
[eventtype=nexus_auth_entraid]
authentication = enabled

# ─── Intrusion Detection data model ──────────────────────────
[eventtype=nexus_ids_guardduty]
ids       = enabled
attack    = enabled

# ─── Alerts (Notable Events for ES) ──────────────────────────
[eventtype=nexus_alert_high_score]
alert     = enabled