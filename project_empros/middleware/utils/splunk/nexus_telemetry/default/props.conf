TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s.%Q
FIELDALIAS-signature  = signature AS finding_type
FIELDALIAS-dest       = dest AS target_ip
FIELDALIAS-sev        = severity AS score
EVAL-vendor           = "AWS"
EVAL-product          = "GuardDuty"
EVAL-app              = "nexus_cloud"

# ═══════════════════════════════════════════════════════════════
# NETWORK SOURCETYPE
# ═══════════════════════════════════════════════════════════════

[nexus:nettap:session]
rename = nexus_json_base
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s.%Q
FIELDALIAS-src_ip     = src AS src_ip
FIELDALIAS-dest       = dest AS dst_ip
FIELDALIAS-src_port   = src_port AS src_port
FIELDALIAS-dest_port  = dest_port AS dst_port
FIELDALIAS-transport  = transport AS protocol_name
FIELDALIAS-bytes_in   = bytes_in AS bytes_dst
FIELDALIAS-bytes_out  = bytes_out AS bytes_src
FIELDALIAS-duration   = duration AS session_duration_ms
FIELDALIAS-http_ua    = http_user_agent AS http_useragent
FIELDALIAS-tls_ja3    = ssl_ja3 AS tls_ja3
EVAL-vendor           = "Sentinel_Nexus"
EVAL-product          = "Network_Tap"
EVAL-app              = "nexus_network"

# ═══════════════════════════════════════════════════════════════
# CATCH-ALL
# ═══════════════════════════════════════════════════════════════

[nexus:generic]
rename = nexus_json_base
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s.%Q
EVAL-vendor           = "Sentinel_Nexus"
EVAL-product          = "Generic"