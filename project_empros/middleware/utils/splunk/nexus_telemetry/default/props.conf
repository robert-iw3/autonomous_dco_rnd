#
# Sentinel Nexus -- Sourcetype Definitions
#
# Each sourcetype corresponds to a CIM schema mapping in the middleware.
# Events arrive as JSON via HEC with the sourcetype pre-set by the worker.
#

# ═══════════════════════════════════════════════════════════════
# GLOBAL DEFAULTS -- all nexus sourcetypes are JSON over HEC
# ═══════════════════════════════════════════════════════════════

[nexus_json_base]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
KV_MODE = json
TIME_FORMAT = %s.%Q
MAX_TIMESTAMP_LOOKAHEAD = 20
TRUNCATE = 65536
CHARSET = UTF-8

# ═══════════════════════════════════════════════════════════════
# ENDPOINT SOURCETYPES
# ═══════════════════════════════════════════════════════════════

[nexus:c2:linux]
rename = nexus_json_base
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s.%Q
FIELDALIAS-dest       = dest AS dest_ip
FIELDALIAS-dest_port  = dest_port AS dest_port
FIELDALIAS-app_name   = app AS process_name
FIELDALIAS-action     = action AS mitre_tactic
FIELDALIAS-sev        = severity AS score
EVAL-vendor           = "Sentinel_Nexus"
EVAL-product          = "C2_Sensor_Linux"
EVAL-index_routing     = if(tonumber(severity)>=70, "nexus_alerts", "nexus_endpoint")

[nexus:deepsensor]
rename = nexus_json_base
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s.%Q
FIELDALIAS-dest       = dest AS destination_ip
FIELDALIAS-dest_port  = dest_port AS port
FIELDALIAS-app_name   = app AS path
FIELDALIAS-parent     = parent_app AS parent_image
FIELDALIAS-cmd        = command AS command_line
FIELDALIAS-sev_name   = severity AS severity_name
EVAL-vendor           = "Sentinel_Nexus"
EVAL-product          = "DeepSensor_Windows"

[nexus:c2:windows]
rename = nexus_json_base
TIME_PREFIX = "time"\s*:\s*
FIELDALIAS-src_ip     = src AS host_ip
FIELDALIAS-dest_addr  = dest AS destination
FIELDALIAS-app_name   = app AS process
FIELDALIAS-sig        = signature AS alert_reason
EVAL-vendor           = "Sentinel_Nexus"
EVAL-product          = "C2_Sensor_Windows"

[nexus:sentinel]
rename = nexus_json_base
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s.%Q
FIELDALIAS-app_name   = app AS comm
FIELDALIAS-parent     = parent_app AS parent_comm
FIELDALIAS-cmd        = command AS command_line
FIELDALIAS-dest       = dest AS dest_ip
FIELDALIAS-dest_port  = dest_port AS dest_port
FIELDALIAS-file       = file_path AS target_file
FIELDALIAS-sev_name   = severity AS level
FIELDALIAS-sig_score  = score AS anomaly_score
FIELDALIAS-tactic     = tactic AS mitre_tactic
FIELDALIAS-technique  = technique AS mitre_technique
EVAL-vendor           = "Sentinel_Nexus"
EVAL-product          = "Linux_Sentinel"

# ═══════════════════════════════════════════════════════════════
# CLOUD SOURCETYPES
# ═══════════════════════════════════════════════════════════════

[nexus:cloud:flow]
