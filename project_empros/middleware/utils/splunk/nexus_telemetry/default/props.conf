EVAL-product          = "Azure_NSG"
EVAL-app              = "nexus_cloud"

[nexus:aws:cloudtrail]
rename = nexus_json_base
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s.%Q
FIELDALIAS-user_id    = user AS caller_identity
FIELDALIAS-action     = action AS event_action
FIELDALIAS-src_ip     = src AS source_ip
EVAL-vendor           = "AWS"
EVAL-product          = "CloudTrail"
EVAL-app              = "nexus_cloud"

[nexus:azure:activity]
rename = nexus_json_base
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s.%Q
FIELDALIAS-user_id    = user AS caller_identity
FIELDALIAS-action     = action AS event_action
EVAL-vendor           = "Microsoft"
EVAL-product          = "Azure_Activity_Log"
EVAL-app              = "nexus_cloud"

[nexus:entraid:signin]
rename = nexus_json_base
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s.%Q
FIELDALIAS-user_name  = user AS principal_name
FIELDALIAS-src_ip     = src AS client_ip
FIELDALIAS-app_name   = app AS application_name
EVAL-vendor           = "Microsoft"
EVAL-product          = "Entra_ID"
