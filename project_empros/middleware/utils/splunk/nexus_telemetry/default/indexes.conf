#
# Sentinel Nexus -- Index Definitions
# Deploy to indexers (cluster master pushes via master-apps).
#
# Four indexes segregated by data category for independent retention,
# access control, and search performance.
#

[nexus_endpoint]
homePath   = $SPLUNK_DB/nexus_endpoint/db
coldPath   = $SPLUNK_DB/nexus_endpoint/colddb
thawedPath = $SPLUNK_DB/nexus_endpoint/thaweddb
frozenTimePeriodInSecs = 7776000
# 90 days hot/warm → frozen
maxTotalDataSizeMB = 512000
# 500 GB cap
maxHotBuckets = 10
maxWarmDBCount = 300

[nexus_cloud]
homePath   = $SPLUNK_DB/nexus_cloud/db
coldPath   = $SPLUNK_DB/nexus_cloud/colddb
thawedPath = $SPLUNK_DB/nexus_cloud/thaweddb
frozenTimePeriodInSecs = 7776000
maxTotalDataSizeMB = 512000
maxHotBuckets = 10
maxWarmDBCount = 300

[nexus_network]
homePath   = $SPLUNK_DB/nexus_network/db
coldPath   = $SPLUNK_DB/nexus_network/colddb
thawedPath = $SPLUNK_DB/nexus_network/thaweddb
frozenTimePeriodInSecs = 5184000
# 60 days -- network session volume is high
maxTotalDataSizeMB = 1024000
# 1 TB cap
maxHotBuckets = 10
maxWarmDBCount = 300

[nexus_alerts]
homePath   = $SPLUNK_DB/nexus_alerts/db
coldPath   = $SPLUNK_DB/nexus_alerts/colddb
thawedPath = $SPLUNK_DB/nexus_alerts/thaweddb
frozenTimePeriodInSecs = 31536000
# 365 days -- alerts retained longer for investigations
maxTotalDataSizeMB = 102400
# 100 GB cap (high-score subset only)
maxHotBuckets = 6
maxWarmDBCount = 300
