#
# Sentinel Nexus -- Event Type Definitions
# Maps sourcetypes to named event types for CIM tagging.
#

# ─── Endpoint ─────────────────────────────────────────────────
[nexus_endpoint_linux]
search = sourcetype="nexus:c2:linux"

[nexus_endpoint_deepsensor]
search = sourcetype="nexus:deepsensor"

[nexus_endpoint_c2win]
search = sourcetype="nexus:c2:windows"

[nexus_endpoint_sentinel]
search = sourcetype="nexus:sentinel"

# ─── Cloud Control Plane ─────────────────────────────────────
[nexus_cloud_cloudtrail]
search = sourcetype="nexus:aws:cloudtrail"

[nexus_cloud_azure_activity]
search = sourcetype="nexus:azure:activity"

# ─── Cloud Network Flows ─────────────────────────────────────
[nexus_cloud_flow]
search = sourcetype="nexus:cloud:flow" OR sourcetype="nexus:azure:nsg"

# ─── Identity / Authentication ───────────────────────────────
[nexus_auth_entraid]
search = sourcetype="nexus:entraid:signin"

# ─── Threat Detection ────────────────────────────────────────
[nexus_ids_guardduty]
search = sourcetype="nexus:aws:guardduty"

[nexus_alert_high_score]
search = (index=nexus_endpoint OR index=nexus_cloud OR index=nexus_network) score>=70

# ─── Network Sessions ────────────────────────────────────────
[nexus_network_session]
search = sourcetype="nexus:nettap:session"