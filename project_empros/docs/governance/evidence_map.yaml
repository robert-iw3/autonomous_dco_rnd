# Control → code-evidence map.
#
# Each control points at the *actual* source that satisfies it, ordered as the
# control's **execution chain** — from invocation (where the live graph / worker
# calls in) through the decision logic to the execution / side-effect. A single
# logic snippet only shows *what* a control computes; the chain shows that it is
# actually *reached and acted on* at runtime. gen_evidence.py extracts each
# snippet anchored on a unique substring (so the evidence tracks the code: if the
# anchor moves or is renamed, the drift test fails and the artifact must be
# regenerated) and renders the per-control chain as an "Execution chain:"
# breadcrumb followed by the numbered steps.
#
# entry fields:
#   file    – path relative to project_empros/
#   anchor  – a unique substring on the first line of the snippet
#   step    – the chain role of this snippet (Invocation / Routing / Node /
#             Logic / Effect / Execution / Persistence / Boot / Proof)
#   before  – context lines to include *above* the anchor line (default 0)
#   after   – lines to include *below* the anchor line (default 0)
#   caption – how this snippet answers the control
#
# Validated by tests/lab_governance/test_governance_manifest.py
# (anchor must resolve; file must exist; every cited control must be in the manifest).
# Pure-documentation controls (no code) are intentionally absent and rendered as
# "documentation control" pointing at their governance artifact.

