       caption: "…enforced by a semaphore acquired before any LLM work — bounding model-denial-of-service blast."}
    - {file: analytics/llm_hunter/orchestrator.py, anchor: "async with _investigation_sema", after: 1,
       caption: "The semaphore gates every investigation entry point."}

  SEC-RLHF-QUARANTINE:
    - {file: services/worker_rlhf/src/main.rs, anchor: "nexus_rlhf_operator_quarantined_total", before: 22, after: 4,
       caption: "Operators exhibiting Sybil/poisoning feedback patterns are quarantined so their preference signal cannot corrupt the RLHF corpus."}

  SEC-DLP-EGRESS:
    - {file: analytics/llm_hunter/tools/sanitizer.py, anchor: "def scrub_outbound_dlp", after: 14,
