  NC-8-OVER-RELIANCE:        [GV.OV, DE.CM]
  NC-9-ACTIVE-LEARNING:      [ID.IM, DE.AE]
  NC-10-VERDICT-LINEAGE:      [PR.DS, DE.AE]
