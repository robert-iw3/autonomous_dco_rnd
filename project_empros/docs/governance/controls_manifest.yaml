# -----------------------------------------------------------------------------
# Sentinel Nexus — Master Controls Manifest (single source of truth)
#
# Every security / AI-governance control is recorded here ONCE with its framework
# mappings, implementing module, and proving tests. The governance markdown
# (controls_catalog.md) is GENERATED from this file by `gen_governance.py`; a
# CI sync-test (test_governance_manifest.py) fails if the docs drift from this
# manifest OR if a referenced implementation/test path no longer exists -- so the
# documentation cannot fall out of date as the code changes.
#
# To add/update a control: edit this file, run `gen_governance.py`, rebuild PDFs.
# Status: implemented | partial | documented | planned
# CSF 2.0 functions: GV govern · ID identify · PR protect · DE detect · RS respond · RC recover
# -----------------------------------------------------------------------------

