server_name: "nexus-lab3-broker"
listen: "0.0.0.0:4222"
http_port: 8222

max_payload: 2MB
ping_interval: "30s"

jetstream {
    store_dir: "/data"
    max_mem: 512MB
    max_file: 2GB
}

# ── H-S1: Subject-level token authorization ───────────────────────────────────
# Mirrors the permission structure in infrastructure/ansible/roles/nats_node/
# templates/nats-server.conf.j2 so Lab 3 proves auth works end-to-end.
# Lab test clients authenticate using the credentials below.
authorization {
    default_permissions {
        publish:   { deny: [">"] }
        subscribe: { deny: [">"] }
    }
    users: [
        {
            user: "ingress_node"
            password: "lab3_ingress_secret"
            permissions: {
                publish:   { allow: ["nexus.*.telemetry"] }
                subscribe: { deny: [">"] }
            }
        }
        {
            user: "worker_node"
            password: "lab3_worker_secret"
            permissions: {
                publish:   { allow: ["nexus.qdrant.alerts", "nexus.dlq.>"] }
                subscribe: { allow: ["nexus.*.telemetry"] }
            }
        }
        {
            user: "swarm_node"
            password: "lab3_swarm_secret"
            permissions: {
                publish:   { allow: ["nexus.soar.actions"] }
                subscribe: { allow: ["nexus.qdrant.alerts"] }
            }
        }
    ]
}
