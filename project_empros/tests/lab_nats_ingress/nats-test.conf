server_name: "nexus-lab3-broker"
listen: "0.0.0.0:4222"
http_port: 8222

max_payload: 2MB
ping_interval: "30s"

jetstream {
    store_dir: "/data"
    max_mem: 512MB
    max_file: 2GB
}

# Mirrors the permission structure in infrastructure/ansible/roles/nats_node/
# templates/nats-server.conf.j2 so Lab 3 proves auth works end-to-end.
# Lab test clients authenticate using the credentials below.
#
# JetStream operations are NATS requests: clients need $JS.API.> / $JS.ACK.>
# publish and _INBOX.> subscribe or every fetch/ack is denied.
authorization {
    default_permissions {
        publish:   { deny: [">"] }
        subscribe: { deny: [">"] }
    }
    users: [
        {
            user: "ingress_node"
            password: "lab3_ingress_secret"
            permissions: {
                publish:   { allow: ["nexus.*.telemetry", "$JS.API.STREAM.INFO.>", "$JS.API.STREAM.CREATE.>", "$JS.API.STREAM.UPDATE.>"] }
                subscribe: { allow: ["_INBOX.>"] }
            }
        }
        {
            user: "worker_node"
            password: "lab3_worker_secret"
            permissions: {
                publish:   { allow: ["nexus.alerts.math", "nexus.alerts.baseline", "nexus.soar.callback", "nexus.training.rlhf.records", "nexus.dlq.>", "$JS.API.>", "$JS.ACK.>"] }
                subscribe: { allow: ["nexus.*.telemetry", "nexus.soar.execute", "nexus.training.rlhf", "nexus.training.rlhf.records", "_INBOX.>"] }
            }
        }
        {
            user: "swarm_node"
            password: "lab3_swarm_secret"
            permissions: {
                publish:   { allow: ["nexus.soar.execute", "nexus.hud.telemetry", "nexus.ti.>", "nexus.training.rlhf", "nexus.dlq.>", "$JS.API.>", "$JS.ACK.>"] }
                subscribe: { allow: ["nexus.alerts.>", "nexus.soar.callback", "nexus.ti.>", "_INBOX.>"] }
            }
        }
        {
            user: "middleware_node"
            password: "lab3_middleware_secret"
            permissions: {
                publish:   { allow: ["middleware.telemetry.>", "middleware.dlq.>", "$JS.API.>", "$JS.ACK.>"] }
                subscribe: { allow: ["middleware.telemetry.>", "middleware.dlq.>", "_INBOX.>"] }
            }
        }
    ]
}
