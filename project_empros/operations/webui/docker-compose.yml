services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ${NEXUS_STACK_PREFIX:-nexus}-webui-ephemeral
    restart: unless-stopped
    networks:
      - deepnet
    env_file:
      - ../.env
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_URL: https://${NEXUS_DOMAIN_WEBUI:-webui.nexus}
      ENABLE_SIGNUP: "false"
      ENABLE_OAUTH_SIGNUP: "true"
      DEFAULT_USER_ROLE: pending
    volumes:
      - ./data:/app/backend/data:z
      - ./config/config.yml:/app/backend/config.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webui.rule=Host(`${NEXUS_DOMAIN_WEBUI:-webui.nexus}`)"
      - "traefik.http.routers.webui.entrypoints=websecure"
      - "traefik.http.routers.webui.tls=true"
      - "traefik.http.routers.webui.middlewares=secured@file"
      - "traefik.http.services.webui.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${NEXUS_MEM_LIMIT_WEBUI:-2g}

networks:
  deepnet:
    external: true
