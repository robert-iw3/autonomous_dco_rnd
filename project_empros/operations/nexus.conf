# ==============================================================================
# Sentinel Nexus -- Central Operations Configuration
# Sourced by scripts/lib.sh and included by the Makefile.
# Do NOT store secrets here -- use scripts/env-gen.sh to generate .env
# ==============================================================================

# -- Container Naming ----------------------------------------------------------
NEXUS_STACK_PREFIX=nexus

# -- Network -------------------------------------------------------------------
NEXUS_NETWORK_NAME=deepnet
NEXUS_NETWORK_SUBNET=10.89.0.0/24
NEXUS_NETWORK_GATEWAY=10.89.0.1

# -- Domains -------------------------------------------------------------------
NEXUS_DOMAIN_SSO=sso.nexus
NEXUS_DOMAIN_N8N=n8n.nexus
NEXUS_DOMAIN_WEBUI=webui.nexus
NEXUS_DOMAIN_INGRESS=ingress.nexus

# -- TLS -----------------------------------------------------------------------
NEXUS_TLS_DIR=/etc/ssl/traefik
NEXUS_CA_NAME=Sentinel-Nexus-CA
NEXUS_TLS_CA_KEY_BITS=4096
NEXUS_TLS_CERT_KEY_BITS=2048
NEXUS_TLS_DAYS_VALID=365

# -- Secrets File --------------------------------------------------------------
NEXUS_ENV_FILE=.env

# -- S3 Data Lake (context injection) -----------------------------------------
NEXUS_S3_ENDPOINT=http://minio:9000
NEXUS_S3_BUCKET=nexus-telemetry
NEXUS_S3_TELEMETRY_PATH=incidents/
NEXUS_S3_USE_SSL=false
NEXUS_S3_URL_STYLE=path

# -- SSO / OIDC ----------------------------------------------------------------
NEXUS_SSO_OAUTH_APP_SLUG=nexus-operations

# -- Inference Routing ---------------------------------------------------------
NEXUS_OLLAMA_URL=http://localhost:11434
NEXUS_VLLM_URL=http://localhost:8000/v1

# -- Health & Deployment -------------------------------------------------------
NEXUS_HEALTH_TIMEOUT=60
NEXUS_HEALTH_INTERVAL=2
NEXUS_TEARDOWN_GRACE_PERIOD=10

# -- Container Memory Limits ---------------------------------------------------
NEXUS_MEM_LIMIT_TRAEFIK=256m
NEXUS_MEM_LIMIT_POSTGRES=512m
NEXUS_MEM_LIMIT_REDIS=128m
NEXUS_MEM_LIMIT_SSO=1g
NEXUS_MEM_LIMIT_SSO_WORKER=768m
NEXUS_MEM_LIMIT_N8N=1g
NEXUS_MEM_LIMIT_WEBUI=2g

# -- Stack Lifecycle -----------------------------------------------------------
# Absolute maximum time a stack can remain active regardless of any other signal.
# Default: 4 hours. Active attacks with continuous piggybacking still honour this ceiling.
NEXUS_STACK_TTL_SECONDS=14400

# Minimum time a stack must stay up before any teardown is considered. Prevents
# the operator's review window from being cut short by a fast CONTAINED callback.
# Default: 30 minutes.
NEXUS_STACK_MIN_LIFETIME_SECONDS=1800

# How long the stack may sit with no new piggybacked alerts before it is treated
# as idle and torn down. Resets whenever a new alert joins the session.
# Default: 30 minutes.
NEXUS_STACK_IDLE_TIMEOUT_SECONDS=1800

# TTL extension granted when a new alert piggybacks onto an active session, or
# when containment partially fails and the operator needs more investigation time.
# Capped so the total never exceeds NEXUS_STACK_TTL_SECONDS from now.
# Default: 1 hour.
NEXUS_STACK_ALERT_EXTEND_SECONDS=3600

# -- Fallback Playbook Delivery (SSH/WinRM) ------------------------------------
# Directory containing the SSH private key for the nexus-responder service account.
# File must be named id_ecdsa (or id_rsa), chmod 600, owned by the n8n process user.
# Generate with: ssh-keygen -t ecdsa -b 521 -f ./ssh/id_ecdsa -N "" -C nexus-responder
NEXUS_SSH_KEY_DIR=./ssh

# SSH username used to connect to managed Linux endpoints.
# This account must exist on all endpoints with sudo NOPASSWD for the required commands.
# Windows endpoints use the same key via OpenSSH (Server Feature, Win 2019+).
NEXUS_SSH_USER=nexus-responder

# Comma-separated management CIDRs/IPs that retain SSH access during host containment.
# Must include the IP address of the nexus operations host itself.
# Example: 10.89.0.0/24,192.168.99.5
NEXUS_MGMT_IPS=10.89.0.0/24

# -- Testing -------------------------------------------------------------------
NEXUS_MOCK_API_PORT=8001
