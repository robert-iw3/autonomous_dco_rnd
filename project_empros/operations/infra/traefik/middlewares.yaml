# Sentinel Nexus -- Traefik Dynamic Middlewares

http:
  middlewares:
    # ── Authentik ForwardAuth (Zero-Trust SSO) ──
    authentik-auth:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid

    # ── Security Headers ──
    default-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlMaxAge: 100
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: SAMEORIGIN
        referrerPolicy: strict-origin-when-cross-origin
        customRequestHeaders:
          X-Forwarded-Proto: https
        customResponseHeaders:
          X-Robots-Tag: noindex,nofollow

    # ── IP Allowlist ──
    nexus-allowlist:
      ipAllowList:
        sourceRange:
          - "192.168.99.0/24"
          - "192.168.88.0/24"
          - "172.20.0.0/24"
          - "127.0.0.1/32"

    # ── Rate Limiting ──
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    # ── Middleware Chain: Full Security Stack ──
    secured:
      chain:
        middlewares:
          - nexus-allowlist
          - rate-limit
          - default-headers
          - authentik-auth
