# ==============================================================================
# Sentinel Nexus -- Traefik Static Configuration
# Restart Traefik to apply changes to this file.
# Dynamic routing, middleware, and TLS are in separate files (auto-watched).
# ==============================================================================

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: WARN

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
  filters:
    statusCodes:
      - "400-599"

api:
  insecure: true
  dashboard: true

ping: {}

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    watch: true
    exposedByDefault: false
    swarmMode: false
  file:
    directory: /etc/traefik/dynamic/
    watch: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls: {}