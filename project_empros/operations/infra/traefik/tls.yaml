# ==============================================================================
# Sentinel Nexus -- Traefik TLS Certificate Store
# Certificates are generated by scripts/cert-gen.sh and mounted read-only.
# ==============================================================================

tls:
  stores:
    default:
      defaultCertificate:
        certFile: /etc/ssl/traefik/n8n.crt
        keyFile: /etc/ssl/traefik/n8n.key

  certificates:
    - certFile: /etc/ssl/traefik/n8n.crt
      keyFile: /etc/ssl/traefik/n8n.key
    - certFile: /etc/ssl/traefik/webui.crt
      keyFile: /etc/ssl/traefik/webui.key
    - certFile: /etc/ssl/traefik/authentik.crt
      keyFile: /etc/ssl/traefik/authentik.key

  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
      sniStrict: true