services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${NEXUS_STACK_PREFIX:-nexus}-n8n-ephemeral
    restart: unless-stopped
    networks:
      - deepnet
    env_file:
      - ../.env
    environment:
      # Ensure n8n uses the correct webhook domain
      N8N_HOST: ${NEXUS_DOMAIN_N8N:-n8n.nexus}
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${NEXUS_DOMAIN_N8N:-n8n.nexus}/
      N8N_LOG_LEVEL: info
      N8N_LOG_OUTPUT: console,file
      N8N_LOG_FILE_LOCATION: /home/node/.n8n/logs/n8n.log
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 24
      # Fallback playbook delivery -- passed through to run_containment.sh
      NEXUS_MGMT_IPS: ${NEXUS_MGMT_IPS:-}
      NEXUS_SSH_USER: ${NEXUS_SSH_USER:-nexus-responder}
      # Cloud containment: HMAC secret + Lambda/Runbook/Function endpoints
      # All populated by env-gen.sh and 02-provision-infra.sh at deploy time.
      NEXUS_HMAC_SECRET: ${NEXUS_HMAC_SECRET:-}
      NEXUS_SHARED_SECRET: ${NEXUS_SHARED_SECRET:-}
      NATS_HTTP_URL: ${NATS_HTTP_URL:-http://nats-server:8222}
      AWS_ISOLATE_LAMBDA_URL: ${AWS_ISOLATE_LAMBDA_URL:-}
      AWS_BLOCK_IP_LAMBDA_URL: ${AWS_BLOCK_IP_LAMBDA_URL:-}
      AZURE_NSG_WEBHOOK_URL: ${AZURE_NSG_WEBHOOK_URL:-}
      GCP_ISOLATE_FUNCTION_URL: ${GCP_ISOLATE_FUNCTION_URL:-}
    volumes:
      - ./workflows:/home/node/.n8n/workflows:ro
      - ./logs:/home/node/.n8n/logs:z
      # Playbook scripts mounted read-only -- run_containment.sh pipes them to remote hosts
      - ../playbooks:/playbooks:ro
      # SSH private key for nexus-responder account on managed endpoints.
      # Path is relative to THIS compose file (operations/n8n/). Key generated by env-gen.sh.
      - ../ssh:/nexus-ssh:ro
      # Shared incident context written by trigger-incident.sh (WebUI + n8n both read it)
      - ../webui/data:/incident-context:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`${NEXUS_DOMAIN_N8N:-n8n.nexus}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.middlewares=secured@file"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${NEXUS_MEM_LIMIT_N8N:-1g}

networks:
  deepnet:
    external: true
