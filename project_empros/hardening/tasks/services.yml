---
# ==============================================================================
# services.yml -- Disable unnecessary services, enable required ones
# ==============================================================================

- name: Mask unnecessary services
  ansible.builtin.systemd:
    name: "{{ item }}.service"
    masked: yes
    state: stopped
  loop: "{{ hardening_disable_services }}"
  failed_when: false

- name: Disable and mask ctrl-alt-del reboot target
  ansible.builtin.systemd:
    name: ctrl-alt-del.target
    masked: yes
  failed_when: false

# -- NTP / Time synchronization ------------------------------------------------
- name: Ensure chrony/systemd-timesyncd is enabled
  ansible.builtin.systemd:
    name: "{{ 'chrony' if ansible_os_family == 'RedHat' else 'systemd-timesyncd' }}"
    state: started
    enabled: yes
  failed_when: false

# -- Disable USB storage (headless server nodes) ------------------------------
- name: Blacklist USB storage kernel module
  ansible.builtin.copy:
    content: |
      install usb-storage /bin/true
      blacklist usb-storage
    dest: /etc/modprobe.d/disable-usb-storage.conf
    owner: root
    group: root
    mode: '0644'

# -- Disable uncommon network protocols ----------------------------------------
- name: Blacklist uncommon network protocols
  ansible.builtin.copy:
    content: |
      install dccp /bin/true
      install sctp /bin/true
      install rds /bin/true
      install tipc /bin/true
      install cramfs /bin/true
      install freevxfs /bin/true
      install hfs /bin/true
      install hfsplus /bin/true
      install squashfs /bin/true
      install udf /bin/true
    dest: /etc/modprobe.d/disable-uncommon.conf
    owner: root
    group: root
    mode: '0644'

# -- File permissions audit ----------------------------------------------------
- name: Set permissions on /etc/passwd
  ansible.builtin.file:
    path: /etc/passwd
    owner: root
    group: root
    mode: '0644'

- name: Set permissions on /etc/shadow
  ansible.builtin.file:
    path: /etc/shadow
    owner: root
    group: "{{ 'shadow' if ansible_os_family == 'Debian' else 'root' }}"
    mode: '0640'

- name: Set permissions on /etc/group
  ansible.builtin.file:
    path: /etc/group
    owner: root
    group: root
    mode: '0644'

- name: Set permissions on /etc/gshadow
  ansible.builtin.file:
    path: /etc/gshadow
    owner: root
    group: "{{ 'shadow' if ansible_os_family == 'Debian' else 'root' }}"
    mode: '0640'
  failed_when: false