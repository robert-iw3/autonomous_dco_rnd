---
# Ansible Galaxy collections required by project_empros Ansible roles.
# Download with: ansible-galaxy collection download -r ansible_requirements.yml -p ../deployment_prep/collections/
# Install offline: ansible-galaxy collection install --offline -r ansible_requirements.yml -p /path/to/collections/

collections:
  - name: community.docker
    version: ">=3.10"

  - name: community.general
    version: ">=9.0"

  - name: ansible.posix
    version: ">=1.5"

  - name: community.crypto
    version: ">=2.20"

  - name: ansible.utils
    version: ">=4.0"

  - name: ansible.windows
    version: ">=2.3"

  - name: community.windows
    version: ">=2.2"

  - name: community.libvirt
    version: ">=1.3"
