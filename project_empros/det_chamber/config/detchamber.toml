collection_dir = "C:\\Collections"
log_dir        = "C:\\Logs"
inetsim_dir    = "E:\\Tools\\Windows\\inetsim"
yara_rules     = "E:\\YARA\\windows_x64_rules.compiled"
procmon_config = "E:\\Tools\\Windows\\malw.pmc"

# -- Detonation tunables --
pcap_time          = 180
parallel           = 4
simulate_network   = false
evidence_tool      = "magnet"                 # "magnet" | "cuckoo"
cuckoo_url         = "http://192.168.56.10:8090"
volatility_plugins = ["windows.pslist", "windows.netscan"]
