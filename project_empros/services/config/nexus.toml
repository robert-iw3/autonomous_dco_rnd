# ==============================================================================
# Sentinel Nexus Configuration Map
# ==============================================================================

[global]
nats_url = "nats://nats:4222"
telemetry_stream = "Tier5_Telemetry"
telemetry_subject = "nexus.*.telemetry"
dlq_subject_prefix = "nexus.dlq"

sensor_stream = "Sensor_Telemetry"
sensor_subject = "nexus.sensor.telemetry"

[ingress]
bind_addr = "0.0.0.0:8080"
tls_enabled = false
tls_cert = "certs/server.pem"
tls_key = "certs/server-key.pem"

[qdrant]
grpc_url = "http://qdrant:6334"
http_url = "http://qdrant:6333"
collection_name = "ueba_vectors"
batch_size = 500

[qdrant.named_vectors]
c2_math        = 8
sentinel_math  = 5
windows_math   = 6   # sysmon_sensor -- 6D (added grant_access_score + driver_trust_score)
deepsensor_math = 4  # windows_deepsensor EdrRow -- score, avg_entropy, max_velocity, event_count
trellix_math   = 6   # trellix_ens 6D -- severity_score, threat_score, action_score, anomaly_score, entropy_score, frequency_score
cloud_flow     = 5
network_tap    = 8
falco_math     = 4   # falco_runtime -- priority_score, container_scope_score, network_activity_score, privileged_score
embedding_384  = 384 # retained for any golden dataset records still using the proxy

[hunter]
active_provider = "internal_sovereign"
# Ordered fallback chain, consulted only if the active provider is unreachable.
# SOVEREIGN BY DEFAULT: list only internal providers here. Add a frontier name
# (e.g. "primary_anthropic") ONLY if you deliberately accept external egress of
# expert prompts for resilience -- DLP does not scrub full prompts.
failover_providers = ["internal_ollama"]
similarity_threshold = 0.85
hunt_interval_seconds = 300

# ==============================================================================
# Archive & Cold Storage (Dual-Provider S3)
# ==============================================================================
# Set 'provider' to "minio", "minio_onprem", or "aws" to select the active backend.
# All providers expose the same S3-compatible API so DuckDB httpfs, the object_store
# crate, and boto3 all work without code changes.

[archive]
provider = "minio_onprem"
bucket_name = "nexus-cold-storage"

[archive.partitioning]
# Hive-style partitioning: telemetry/{type}/dt={YYYY-MM-DD}/hour={HH}/{uuid}.parquet
# Enables DuckDB automatic partition discovery and predicate pushdown on dt/hour.
path_style = "hive"
# Future compaction: merge small files when this row count is reached per partition
network_tap_compaction_rows = 100000

[archive.minio]
# Shared MinIO service (e.g., existing infrastructure)
endpoint = "http://minio-service.sentinel-nexus.svc.cluster.local:9000"

[archive.minio_onprem]
# Dedicated on-prem MinIO deployed by the minio_node Ansible role
endpoint = "https://minio.internal.local:9000"
access_key_env_var = "MINIO_ACCESS_KEY"
secret_key_env_var = "MINIO_SECRET_KEY"

[archive.aws]
region = "us-east-1"
# AWS credentials via IAM instance profile (no keys needed)

# ==============================================================================
# Model A: Network Baseline Engine (LSTM-Autoencoder)
# ==============================================================================
# The baseline detector runs as a standalone service (serve_baseline.py) that
# consumes network_tap flows from NATS and fires anomaly events when the
# reconstruction error exceeds the calibrated threshold.

[baseline]
# Sliding window parameters
window_size = 64          # Flows per window (must match training)
stride = 16               # Inference every N new flows per IP pair
max_tracked_pairs = 50000 # Memory cap: pairs x window_size x 8 floats x 4 bytes

# Model architecture (must match train_lstm_ae.py)
hidden_dim = 64
latent_dim = 32

# Calibrated by train_lstm_ae.py (μ + 3σ on eval set reconstruction error)
# Updated automatically by the training pipeline. Manual override available.
reconstruction_threshold = 0.05

# Path to saved model weights (safetensors only -- no pickle)
model_path = "/opt/sentinel-nexus/mlops/models/baseline"

# NATS subjects
input_subject = "nexus.network_tap.telemetry"
alert_subject = "nexus.alerts.baseline"

[sensors]
accepted_ids = ["c2-sensor-alpha", "c2-sensor-beta", "c2-sensor-gamma"]
max_batch_size = 5000
retention_hours = 168

[sentinel]
accepted_ids = ["linux-sentinel-prod", "linux-sentinel-dmz"]
sentinel_stream = "Sentinel_Telemetry"
sentinel_subject = "nexus.sentinel.telemetry"
max_payload_mb = 10

# ==============================================================================
# Dynamic Parquet Schema Mappings
# ==============================================================================

[schema_mappings.linux_c2]
identifier_column = "outbound_ratio"
vector_name = "c2_math"
primary_key_column = "id"
timestamp_column = "timestamp"
sensor_id_column = "sensor_id"

vector_columns = [
    "outbound_ratio", "packet_size_mean", "packet_size_std",
    "interval", "cv", "entropy", "cmd_entropy", "score"
]

context_columns = [
    "process_name", "pid", "uid", "process_hash", "event_type",
    "dst_ip", "dst_port", "packet_size_min", "packet_size_max",
    "dns_query", "dns_flags", "mitre_tactic", "ml_result",
    "reasons", "suppressed", "hostname"
]

[schema_mappings.windows_c2]
identifier_column = "Image"
vector_name = "c2_math"
primary_key_column = "event_id"
timestamp_column = "timestamp"
sensor_id_column = "host"

vector_columns = [
    "outbound_ratio", "packet_size_mean", "packet_size_std",
    "interval", "cv", "entropy", "cmd_entropy", "score"
]

context_columns = [
    "Image", "CommandLine", "PID", "TID",
    "DestIp", "Port", "Query", "ThreatIntel"
]

[schema_mappings.linux_sentinel]
# identifier_column: used by worker_qdrant for source-type duck-typing detection.
# "shannon_entropy" is a sentinel_math-exclusive field -- valid discriminator.
identifier_column = "shannon_entropy"
vector_name = "sentinel_math"
primary_key_column = "event_id"
timestamp_column = "timestamp"
# sensor_id_column: must identify the REPORTING HOST, not a network destination.
# The eBPF/auditd agent embeds its own hostname as "sensor_id" in every record.
sensor_id_column = "sensor_id"

vector_columns = [
    "shannon_entropy", "execution_velocity", "tuple_rarity",
    "path_depth", "anomaly_score"
]

context_columns = [
    "level", "mitre_tactic", "mitre_technique", "pid", "ppid", "uid",
    "container_name", "comm", "command_line", "parent_comm", "user_name",
    "target_file", "dest_ip", "dest_port", "message"
]

[schema_mappings.trellix_ens]
# Trellix Endpoint Security (ENS) endpoint telemetry.
identifier_column  = "detection_name"
vector_name        = "trellix_math"
primary_key_column = "sensor_id"
timestamp_column   = "timestamp"
sensor_id_column   = "sensor_id"

vector_columns = [
    "severity_score",   # [0] ThreatSeverity 1-5 → [0.2, 1.0]
    "threat_score",     # [1] malicious=1.0 suspicious=0.7 pua=0.4 clean=0.0
    "action_score",     # [2] blocked=1.0 quarantined=0.75 cleaned=0.5 detected=0.25
    "anomaly_score",    # [3] IsolationForest UEBA score
    "entropy_score",    # [4] Shannon entropy of FilePath+ProcessName [0,1]
    "frequency_score",  # [5] inverse ThreatName+ThreatType novelty [0,1]
]

context_columns = [
    "host", "process", "pid", "user", "file_path", "file_name",
    "threat_source_url", "detection_name", "threat_type", "action", "severity",
    "threat_category", "event_id", "source_component", "analyzer_detection_method"
]

[schema_mappings.macos_sensor]
# macOS endpoint sensor -- LaunchAgent/Daemon persistence, code signature events.
# Placeholder: maps to windows_math (6D) until macOS sensor emits full 6D vector.
# identifier_column: plist_path (unique to macOS persistence telemetry).
identifier_column  = "plist_path"
vector_name        = "windows_math"
primary_key_column = "sensor_id"
timestamp_column   = "timestamp"
sensor_id_column   = "sensor_id"

vector_columns = [
    "command_entropy",    # Shannon entropy of process args
    "parent_child_score", # Suspicious parent-child score
    "integrity_score",    # Code signature validity 0-1
    "anomaly_score",      # Model A baseline
]

context_columns = [
    "process_name", "file_path", "plist_path",
    "code_signature", "quarantine_flag", "publisher",
]

[schema_mappings.sysmon_sensor]
# Sysmon event stream from endpoints running SysmonSensor.py.
# identifier_column: sysmon_event_id (int32) -- unique to Sysmon, never in EdrRow.
# vector_name: windows_math (6D) -- expanded from 4D to capture access rights and driver trust.
# Normalisation: all inputs pre-normalised to [0,1] in schema.py compute_features().
identifier_column  = "sysmon_event_id"
vector_name        = "windows_math"
primary_key_column = "sysmon_event_id"
timestamp_column   = "timestamp"
sensor_id_column   = "sensor_id"

vector_columns = [
    "command_entropy",    # [0] Shannon entropy of CommandLine (0-8 → 0-1)
    "parent_child_score", # [1] Suspicious parent-child pair score 0-1
    "integrity_score",    # [2] Low=0.0, Medium=0.33, High=0.67, System=1.0
    "anomaly_score",      # [3] Model A baseline score (placeholder 0.5)
    "grant_access_score", # [4] EventID 10 GrantedAccess / 0x1FFFFF  (exploitation signal)
    "driver_trust_score", # [5] EventID 6/7 signature validity INVERTED (BYOVD/LOLDRIVER signal)
]

context_columns = [
    "Image", "CommandLine", "ParentImage", "ParentCommandLine",
    "User", "IntegrityLevel", "ProcessId", "ParentProcessId",
    "DestinationIp", "DestinationPort", "Protocol",
    "TargetImage", "GrantedAccess",
    "TargetObject", "Details", "EventType_reg",
    "ImageLoaded", "Signed", "SignatureStatus",
    "PipeName", "QueryName", "QueryResults",
    "TargetFilename", "TamperingType", "Hashes",
]

[schema_mappings.windows_deepsensor]
identifier_column = "max_velocity"
vector_name = "deepsensor_math"  # separated from sysmon windows_math (different feature set)
primary_key_column = "event_id"
timestamp_column = "timestamp"
# sensor_id_column must identify the REPORTING HOST (not a network destination).
# EdrRow.host is the Windows hostname where the EDR event originated.
sensor_id_column = "host"

vector_columns = [
    "score",       # [0] Raw 0-10 UEBA score (normalised /100 in worker_qdrant)
    "avg_entropy", # [1] UEBA entropy (normalised /8)
    "max_velocity", # [2] UEBA velocity (normalised /5000)
    "event_count", # [3] UEBA event count (normalised /100)
]

context_columns = [
    "category", "event_type", "pid", "parent_pid", "tid", "path",
    "parent_image", "command_line", "event_user", "destination_ip", "port",
    "signature_name", "tactic", "technique", "severity"
]

[schema_mappings.cloud_flow]
identifier_column = "event_type"
vector_name = "cloud_flow"
primary_key_column = "sensor_id"
timestamp_column = "timestamp"
sensor_id_column = "sensor_id"

vector_columns = ["interval", "cv", "outbound_ratio", "packet_size_mean", "score"]

context_columns = [
    "process_name", "dst_ip", "dst_port", "mitre_tactic", "mitre_technique",
    "process_hash", "reasons", "event_type", "description"
]

[schema_mappings.network_tap]
identifier_column = "session_id"
vector_name = "network_tap"
primary_key_column = "session_id"
timestamp_column = "timestamp_start"
sensor_id_column = "sensor_name"

vector_columns = [
    "byte_ratio", "avg_inter_arrival", "variance_inter_arrival",
    "ratio_small_packets", "ratio_large_packets", "payload_entropy",
    "session_duration_ms", "packets_src"
]

context_columns = [
    "src_ip", "dst_ip", "dst_port", "protocol_name",
    "dns_query", "http_uri", "http_useragent",
    "tls_ja3", "tls_ja3s", "cert_cn", "cert_self_signed",
    "dst_geo_country", "dst_asn_org", "hostname",
    "is_internal_dst", "port_class"
]

# -- GCP / VMware Connectors (UnifiedFlowRecord → cloud_flow vector) ----------
# All emit the same 33-column UnifiedFlowRecord schema. Each gets its own
# sensor_type for per-source NATS routing and Hive partition granularity,
# but they share the cloud_flow named vector (size 5).

[schema_mappings.gcp_audit]
identifier_column = "event_type"
vector_name = "cloud_flow"
primary_key_column = "sensor_id"
timestamp_column = "timestamp"
sensor_id_column = "sensor_id"
vector_columns = ["interval", "cv", "outbound_ratio", "packet_size_mean", "score"]
context_columns = [
    "process_name", "dst_ip", "dst_port", "mitre_tactic", "mitre_technique",
    "process_hash", "reasons", "event_type", "description",
]

[schema_mappings.gcp_scc]
identifier_column = "event_type"
vector_name = "cloud_flow"
primary_key_column = "sensor_id"
timestamp_column = "timestamp"
sensor_id_column = "sensor_id"
vector_columns = ["interval", "cv", "outbound_ratio", "packet_size_mean", "score"]
context_columns = [
    "process_name", "dst_ip", "dst_port", "mitre_tactic", "mitre_technique",
    "process_hash", "reasons", "event_type", "description",
]

[schema_mappings.gcp_vpc_flow]
identifier_column = "event_type"
vector_name = "cloud_flow"
primary_key_column = "sensor_id"
timestamp_column = "timestamp"
sensor_id_column = "sensor_id"
vector_columns = ["interval", "cv", "outbound_ratio", "packet_size_mean", "score"]
context_columns = [
    "process_name", "dst_ip", "dst_port", "mitre_tactic", "mitre_technique",
    "process_hash", "reasons", "event_type", "description",
]

[schema_mappings.vmware_syslog]
identifier_column = "event_type"
vector_name = "cloud_flow"
primary_key_column = "sensor_id"
timestamp_column = "timestamp"
sensor_id_column = "sensor_id"
vector_columns = ["interval", "cv", "outbound_ratio", "packet_size_mean", "score"]
context_columns = [
    "process_name", "dst_ip", "dst_port", "mitre_tactic", "mitre_technique",
    "process_hash", "reasons", "event_type", "description",
]

[schema_mappings.suricata_eve]
# Suricata IDS EVE JSON -- routed to net_expert, stored in c2_math vector space.
# identifier_column: community_id is a standardized 5-tuple hash unique to Suricata EVE.
# The suricata ingestion pipeline pre-computes c2_math columns from flow statistics.
identifier_column = "community_id"
vector_name = "c2_math"
primary_key_column = "community_id"
timestamp_column = "timestamp"
sensor_id_column = "sensor_id"

vector_columns = [
    "outbound_ratio", "packet_size_mean", "packet_size_std",
    "interval", "cv", "entropy", "cmd_entropy", "score"
]

context_columns = [
    "src_ip", "dest_ip", "src_port", "dest_port", "proto",
    "signature_id", "signature", "severity", "category",
    "alert_action", "flow_id", "mitre_tactic", "mitre_technique"
]

[schema_mappings.falco_runtime]
# Falco (k8s) runtime security telemetry -- container/syscall rule violations.
# identifier_column: "rule" is non-nullable in falco_schema() and collision-free
# against every other registered mapping's identifier/vector/context columns.
# vector_name: falco_math (4D) -- derived feature scores computed in-sensor by
# falco_transmitter (Falco emits pure raw telemetry with no native numeric
# ML features, unlike sentinel's shannon_entropy or trellix's severity_score).
identifier_column  = "rule"
vector_name        = "falco_math"
primary_key_column = "sensor_id"
timestamp_column   = "timestamp"
sensor_id_column   = "sensor_id"

vector_columns = [
    "priority_score",          # [0] Falco priority (emergency..debug) mapped to [0,1]
    "container_scope_score",   # [1] 1.0 if event occurred inside a container, else 0.0
    "network_activity_score",  # [2] 1.0 if fd.sip/fd.dip present (network-related syscall)
    "privileged_score",        # [3] 1.0 if user.uid == 0 (root/privileged context)
]

context_columns = [
    "rule", "output", "priority", "hostname",
    "container_id", "container_name", "container_image",
    "proc_name", "proc_cmdline", "user_name",
    "evt_type", "fd_name", "fd_sip", "fd_dip"
]

# ==============================================================================
# Threat-Intelligence Gateway (tools/ti_lookup.py)
# ==============================================================================
# A provider runs only if it is listed in `enabled_providers` AND its API key
# env var is present (set in hunter.env from Ansible Vault -- secrets never live
# in this file). External providers are skipped automatically for internal /
# private IPs; only the internal 'misp' feed (egress=False) may resolve internal
# assets. Results are cached in Redis (24h) and rate-limited per free-tier budget.

[threat_intel]
enabled_providers = ["misp", "virustotal", "abuseipdb", "otx", "xforce", "greynoise"]

# Env vars consumed (wired in hunter.env.j2):
#   VT_API_KEY           VirusTotal          ip/domain/hash   (4/min · 500/day)
#   ABUSEIPDB_API_KEY    AbuseIPDB           ip               (1000/day)
#   OTX_API_KEY          AlienVault OTX      ip/domain/hash
#   XFORCE_API_KEY       IBM X-Force         ip/domain/hash   (needs both key + password)
#   XFORCE_API_PASSWORD  IBM X-Force password
#   GREYNOISE_API_KEY    GreyNoise Community ip
# Tunables: NEXUS_TI_CACHE_TTL, NEXUS_TI_HTTP_TIMEOUT,
#           NEXUS_ABUSEIPDB_THRESHOLD, NEXUS_XFORCE_THRESHOLD

[threat_intel.misp]
# Internal sovereign IOC feed. Endpoint is non-secret config; the key is an env
# reference following the same convention as the LLM provider blocks below.
endpoint = "https://misp.internal.local"
api_key_env_var = "MISP_API_KEY"
verify_tls = true   # set false, or a CA-bundle path, for a self-signed internal cert

# ==============================================================================
# LLM Provider Definitions
# ==============================================================================
[llm.internal_sovereign]
api_type = "rest_openai_compatible"
api_key_env_var = ""
endpoint = "http://nexus-vllm:8000/v1"
model = "nexus-spatial-endpoint"  # matches MODEL_C_DISPLAY in mlops/model_config.toml

[llm.primary_openai]
api_type = "openai"
api_key_env_var = "OPENAI_API_KEY"
model = "gpt-4o"

[llm.primary_anthropic]
api_type = "anthropic"
api_key_env_var = "ANTHROPIC_API_KEY"
model = "claude-opus-4-6"

[llm.internal_ollama]
api_type = "rest_openai_compatible"
api_key_env_var = ""
endpoint = "http://ollama:11434/v1/chat/completions"
model = "${NEXUS_OLLAMA_MODEL:-llama3.3}"  # override via NEXUS_OLLAMA_MODEL env var

[llm.azure_corporate]
api_type = "rest_openai_compatible"
api_key_env_var = "AZURE_OPENAI_KEY"
endpoint = "https://corp-ai.openai.azure.com/openai/deployments/gpt-4o/chat/completions?api-version=2024-02-15-preview"
model = "gpt-4o"