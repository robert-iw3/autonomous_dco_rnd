[TRANSMISSION]
; ── Nexus Sysmon Sensor Configuration ─────────────────────────────────────
; Matches the middleware sensor_profiles/ format used by all Nexus sensors.
; Environment variables take precedence over these values.

; Middleware ingress endpoint (same as windows_sensor.toml)
MiddlewareEndpoint = https://middleware.internal:8443/api/v1/telemetry

; Bearer token for middleware authentication -- rotate before production
AuthToken = ChangeMe-Rotate-In-Production

; HMAC-SHA256 shared secret -- must match middleware config
IntegritySecret = Nexus-Integrity-SharedKey-Rotate-Me

; Sensor type identifier -- must match nexus.toml schema_mappings key
; Do NOT change this value.
SensorType = sysmon_sensor

; SQLite queue path for disk-backed batch spooling
QueueDbPath = C:\ProgramData\NexusSysmonSensor\Data\TransmissionQueue.db

; Set to True only if the middleware TLS cert is self-signed (dev/test)
TrustSelfSignedCert = False

; Rows per Parquet batch before forced flush
MaxBatchSize = 500

; S3 direct fallback (optional -- leave empty to disable)
; Used when middleware is unreachable (air-gap fallback)
; S3Endpoint = https://minio.internal.local:9000
; S3Bucket   = nexus-cold-storage

[AGENT]
; Poll interval in milliseconds for reading new Sysmon events
PollMs = 500

; Log directory
LogDir = C:\ProgramData\NexusSysmonSensor\logs

; Bookmark file path (allows resuming after restart)
BookmarkPath = C:\ProgramData\NexusSysmonSensor\bookmark.xml