# Data-flow stress lab
#
#   loadgen (mock Gigamon tap + Arkime)
#     ├─ SPI JSON ─────────────► redpanda ──► ml-gateway ──► mock-ingress (ML path / nexus-edge)
#     └─ SPI docs  ─────────────► opensearch (forensic path)        ▲
#                                                    redis ─────────┘ (session cache)
#
# The driver (test_pipeline_stress.py) produces escalating loads and asserts no
# data is lost on EITHER path. Lab only -- single nodes, security off, lab secrets.

services:
  redpanda:
    image: docker.io/redpandadata/redpanda:v26.1.9
    command:
      - redpanda
      - start
      - --smp=2
      - --memory=2G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [lab]

  opensearch:
    image: docker.io/opensearchproject/opensearch:3.7.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:19200:9200"
    networks: [lab]

  redis:
    image: docker.io/redis:8.8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [lab]

  mock-ingress:
    build:
      context: ./mock_ingress
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,ssl; urllib.request.urlopen('https://localhost:8443/stats', context=ssl._create_unverified_context())\""]
      interval: 5s
      timeout: 5s
      retries: 15
    ports:
      - "127.0.0.1:18443:8443"
    networks: [lab]

  ml-gateway:
    build:
      context: ../../gateway
    environment:
      - GATEWAY_CONFIG=/data/config/config.toml
    volumes:
      - ./lab_config.toml:/data/config/config.toml:ro
      - ./certs:/data/config/certs:ro
      - gateway_spool:/data/spool
    depends_on:
      redpanda:     { condition: service_healthy }
      redis:        { condition: service_healthy }
      mock-ingress: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/metrics | grep -Eq '^gateway_consumer_heartbeat_seconds [1-9]'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    ports:
      - "127.0.0.1:19090:9090"
    networks: [lab]

  loadgen:
    build:
      context: ./loadgen
    depends_on:
      redpanda:   { condition: service_healthy }
      opensearch: { condition: service_healthy }
    networks: [lab]

volumes:
  gateway_spool:

networks:
  lab:
    driver: bridge
